# feeds.yaml — 所有订阅源清单（RSS + 爬虫）
#
# 字段说明:
#   name:         显示名称（会出现在 journal 条目的 [来源] 标签中）
#   slug:         输出文件名（不含 .md），如 slug: openai → journal/YYYY/MM/DD/openai.md
#   url:          RSS / Atom 地址（type: rss 时必填）
#   type:         rss（默认）| scrape（网页爬取）
#   verified:     true = 已验证可用，false = 待验证
#
# type: scrape 的源：爬取逻辑在 scripts/scrapers/<slug>.py 中独立维护，
# 此处只作为清单登记 name / slug / verified。
#
# 添加新源后建议先跑一次:
#   uv run scripts/daily_update.py --hours 1

# ── 论文 ──────────────────────────────────────
papers:
  - name: arXiv cs.AI
    slug: arxiv-cs-ai
    url: https://rss.arxiv.org/rss/cs.AI
    verified: true

  - name: arXiv cs.CL
    slug: arxiv-cs-cl
    url: https://rss.arxiv.org/rss/cs.CL
    verified: true

# ── 厂商博客 ──────────────────────────────────
industry:
  - name: OpenAI
    slug: openai
    url: https://openai.com/blog/rss.xml
    verified: true

  - name: Google DeepMind
    slug: google-deepmind
    url: https://deepmind.google/blog/rss.xml
    verified: true

  - name: Meta Engineering
    slug: meta-engineering
    url: https://engineering.fb.com/feed/
    verified: true

  - name: Microsoft Research
    slug: microsoft-research
    url: https://www.microsoft.com/en-us/research/feed/
    verified: true

  - name: Google AI Blog
    slug: google-ai-blog
    url: https://blog.google/technology/ai/rss/
    verified: true

  - name: NVIDIA AI
    slug: nvidia-ai
    url: https://blogs.nvidia.com/feed/
    verified: true

  - name: Apple Machine Learning
    slug: apple-ml
    url: https://machinelearning.apple.com/rss.xml
    verified: true

  - name: Anthropic
    slug: anthropic
    type: scrape
    verified: true

  - name: Claude Blog
    slug: claude-blog
    type: scrape
    verified: true

# ── 社区 / 独立博主 ───────────────────────────
community:
  - name: Latent Space
    slug: latent-space
    url: https://www.latent.space/feed
    verified: true

  - name: Sebastian Raschka
    slug: sebastian-raschka
    url: https://magazine.sebastianraschka.com/feed
    verified: true

  - name: Simon Willison
    slug: simon-willison
    url: https://simonwillison.net/atom/everything/
    verified: true

  - name: GitHub Trending
    slug: github-trending
    type: scrape
    verified: true
